# Configuración de GastosPro para Render.com (Blueprint).
# Crea automáticamente: una base de datos PostgreSQL gratis (persistente) y el
# backend (Web Service) ya conectado a ella vía DATABASE_URL.

databases:
  - name: gastospro-db
    plan: free
    databaseName: gastospro
    user: gastospro

services:
  - type: web
    name: gastospro-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run serve
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Conexión a la base de datos Postgres de arriba (Render la inyecta sola).
      - key: DATABASE_URL
        fromDatabase:
          name: gastospro-db
          property: connectionString
      # Secreto para firmar sesiones (se genera seguro automáticamente).
      - key: JWT_SECRET
        generateValue: true
      # Correos: pega estos dos en el panel de Render → Environment.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: REMINDER_DAYS_AHEAD
        value: "2"
